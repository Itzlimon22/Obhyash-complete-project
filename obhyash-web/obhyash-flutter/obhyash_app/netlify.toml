[build]
  command = "bash build-web.sh"
  publish = "build/web"

[build.environment]
  # Flutter channel – "stable" always picks the latest stable release
  FLUTTER_CHANNEL = "stable"

# SPA fallback: all routes → index.html (required for go_router path URLs)
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
