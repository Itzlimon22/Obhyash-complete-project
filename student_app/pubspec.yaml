name: student_app
description: 'A new Flutter project.'
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # Networking & Database
  http: ^1.2.0
  supabase_flutter: ^2.12.0
  app_links: ^6.4.1

  # State Management
  flutter_riverpod: ^2.6.1

  # UI & Animation
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  scrollable_positioned_list: ^0.3.8
  cupertino_icons: ^1.0.8

  # Utils
  intl: ^0.20.2
  logger: ^2.6.2

  # Image & File Handling
  image_picker: ^1.2.1

  # PDF & Printing (Critical for Result Download)
  pdf: ^3.11.3
  printing: ^5.14.2

  # Math/LaTeX Rendering
  flutter_math_fork: ^0.7.2
  # Note: flutter_tex is heavy for web. using flutter_math_fork for performance.
  # flutter_tex: ^4.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # ✅ CRITICAL: Register the Bengali font asset for PDF generation
  assets:
    - assets/fonts/Kalpurush.ttf

  # (Optional) If you want to use custom fonts in the App UI itself:
  # fonts:
  #   - family: Kalpurush
  #     fonts:
  #       - asset: assets/fonts/Kalpurush.ttf
